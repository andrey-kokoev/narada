name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-core:
    name: Test Core Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck
        working-directory: packages/exchange-fs-sync

      - name: Run tests
        run: pnpm test
        working-directory: packages/exchange-fs-sync

      - name: Run tests with coverage
        run: pnpm vitest run --coverage
        working-directory: packages/exchange-fs-sync

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          directory: packages/exchange-fs-sync/coverage
          flags: core
          name: core-coverage

  test-cli:
    name: Test CLI Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck
        working-directory: packages/exchange-fs-sync-cli

      - name: Run tests
        run: pnpm test
        working-directory: packages/exchange-fs-sync-cli

      - name: Run tests with coverage
        run: pnpm vitest run --coverage
        working-directory: packages/exchange-fs-sync-cli

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          directory: packages/exchange-fs-sync-cli/coverage
          flags: cli
          name: cli-coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run kernel invariant lint
        run: pnpm kernel-lint

      - name: Check formatting
        run: pnpm fmt --check
        working-directory: packages/exchange-fs-sync
