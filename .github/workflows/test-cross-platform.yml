name: Test Cross-Platform

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit
        env:
          CI: true

      - name: Run integration tests (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm test:integration
        env:
          CI: true

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  windows-specific:
    name: Windows-specific tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run Windows tests
        run: pnpm --filter='@narada2/control-plane' test -- --testPathPattern=test/windows
        env:
          CI: true

      - name: Test PowerShell install script syntax
        shell: pwsh
        run: |
          Get-Command Test-Path
          # Validate PowerShell syntax
          $script = Get-Command scripts/install.ps1
          Write-Host "Install script exists: $($script -ne $null)"

  path-tests:
    name: Path handling tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run path utility tests
        run: pnpm --filter='@narada2/control-plane' test -- --testPathPattern=test/unit/utils/path
        env:
          CI: true

      - name: Test long paths (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Enable long path support in PowerShell
          New-Item -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Type DWORD -Force
          # Test creating a deeply nested path
          $deepPath = "C:\temp\test" + ("\a" * 200)
          New-Item -ItemType Directory -Force -Path $deepPath
          Write-Host "Successfully created deep path"
