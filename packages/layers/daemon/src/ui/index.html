<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narada Operator Console</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --muted: #484f58;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }
    nav {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    nav header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    nav header h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.3px;
    }
    nav header p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--text-secondary);
    }
    nav menu {
      list-style: none;
      margin: 0;
      padding: 10px 0;
      flex: 1;
    }
    nav menu li a {
      display: block;
      padding: 10px 20px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      border-left: 3px solid transparent;
    }
    nav menu li a:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    nav menu li a.active {
      color: var(--text);
      background: rgba(88,166,255,0.08);
      border-left-color: var(--accent);
    }
    .link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .breadcrumb button {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      font-size: 13px;
    }
    .timeline-row td { padding: 12px; }
    .timeline-event { display: flex; align-items: flex-start; gap: 12px; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--muted); }
    .timeline-dot.fact { background: var(--accent); }
    .timeline-dot.context { background: var(--warning); }
    .timeline-dot.work { background: var(--success); }
    .timeline-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .toolbar select, .toolbar input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
    .toolbar input { min-width: 220px; }
    .toolbar button {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar button:hover { border-color: var(--muted); }
    .toolbar button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .toolbar button.primary:hover { background: var(--accent-hover); }
    button.small {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    button.small:hover { border-color: var(--muted); }
    .toolbar .spacer { flex: 1; }
    .toolbar .status {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .content {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    .empty {
      color: var(--text-secondary);
      font-size: 14px;
      padding: 40px 0;
    }
    .error {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-secondary);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .metric {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .metric .value {
      font-size: 24px;
      font-weight: 600;
    }
    .metric .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    th {
      color: var(--text-secondary);
      font-weight: 500;
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }
    .badge-opened { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-leased { background: rgba(211,153,33,0.15); color: var(--warning); }
    .badge-executing { background: rgba(211,153,33,0.25); color: #e3b341; }
    .badge-resolved { background: rgba(63,185,80,0.15); color: var(--success); }
    .badge-failed { background: rgba(248,81,73,0.15); color: var(--danger); }
    .badge-admitted { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-running { background: rgba(211,153,33,0.25); color: #e3b341; }
    .badge-completed { background: rgba(63,185,80,0.15); color: var(--success); }
    .badge-timer, .badge-webhook, .badge-filesystem, .badge-mail {
      background: var(--surface-2);
      color: var(--text-secondary);
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; }
    .truncate { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <nav>
    <header>
      <h1>Narada</h1>
      <p>Operator Console</p>
    </header>
    <menu>
      <li><a href="#overview" class="active" data-page="overview">Overview</a></li>
      <li><a href="#timeline" data-page="timeline">Timeline</a></li>
      <li><a href="#facts" data-page="facts">Facts</a></li>
      <li><a href="#contexts" data-page="contexts">Contexts</a></li>
      <li><a href="#work" data-page="work">Work</a></li>
      <li><a href="#intents" data-page="intents">Intents</a></li>
      <li><a href="#executions" data-page="executions">Executions</a></li>
      <li><a href="#workers" data-page="workers">Workers</a></li>
      <li><a href="#operability" data-page="operability">Operability</a></li>
      <li><a href="#failures" data-page="failures">Failures</a></li>
      <li><a href="#verticals" data-page="verticals">Verticals</a></li>
      <li><a href="#audit" data-page="audit">Audit Log</a></li>
    </menu>
  </nav>

  <main>
    <div class="toolbar">
      <select id="scopeSelect"><option value="">Select scope…</option></select>
      <input id="searchInput" type="text" placeholder="Filter by ID, status, or type…" />
      <div class="spacer"></div>
      <span class="status" id="statusText">Loading scopes…</span>
      <button id="refreshBtn" class="primary">Refresh</button>
    </div>

    <div class="content" id="content">
      <div class="empty">Select a scope to begin.</div>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    let scopes = [];
    let currentScope = "";
    let currentPage = "overview";
    let abortController = null;
    let detailState = null; // { type: 'fact'|'context'|'work_item', id: string, returnPage: string }

    const $ = (id) => document.getElementById(id);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));

    async function api(path) {
      const res = await fetch(`${API_BASE}${path}`);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.reason || data.error || `${res.status} ${res.statusText}`);
      return data;
    }

    async function doAction(actionType, targetId, payloadJson) {
      try {
        const body = { action_type: actionType, target_id: targetId };
        if (payloadJson) body.payload_json = JSON.stringify(payloadJson);
        const result = await apiPost(`/control/scopes/${encodeURIComponent(currentScope)}/actions`, body);
        $("statusText").textContent = `Action ${actionType} executed (${result.request_id})`;
        setTimeout(() => loadPage(), 300);
      } catch (err) {
        setError(err);
      }
    }

    async function loadScopes() {
      const data = await api("/scopes");
      scopes = data.scopes || [];
      const select = $("scopeSelect");
      select.innerHTML = '<option value="">Select scope…</option>' +
        scopes.map(s => `<option value="${esc(s.scope_id)}">${esc(s.scope_id)}</option>`).join("");
      $("statusText").textContent = scopes.length === 0 ? "No scopes available" : `${scopes.length} scope(s)`;
      if (scopes.length === 1) {
        currentScope = scopes[0].scope_id;
        select.value = currentScope;
        await loadPage();
      }
    }

    function esc(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleString();
    }

    function badge(text, extraClass = "") {
      return `<span class="badge badge-${text.toLowerCase().replace(/\s+/g, "-")} ${extraClass}">${esc(text)}</span>`;
    }

    function setLoading() {
      $("content").innerHTML = '<div class="empty">Loading…</div>';
    }

    function setError(err) {
      $("content").innerHTML = `<div class="error">${esc(err.message || String(err))}</div>`;
    }

    function filterRows(rows, keys) {
      const q = $("searchInput").value.trim().toLowerCase();
      if (!q) return rows;
      return rows.filter(r => keys.some(k => String(r[k] ?? "").toLowerCase().includes(q)));
    }

    async function loadOverview() {
      const { overview } = await api(`/scopes/${encodeURIComponent(currentScope)}/overview`);
      const scope = overview.scopes.find(s => s.scope_id === currentScope) || overview.scopes[0];
      const factRows = Object.entries(overview.facts.by_vertical).map(([vertical, count]) => `
        <tr><td>${esc(vertical)}</td><td>${esc(count)}</td></tr>
      `).join('');
      const failureRows = filterRows(overview.recent_failures, ["scope_id", "vertical", "context_id", "work_item_id"]).map(f => `
        <tr>
          <td>${esc(f.scope_id)}</td>
          <td>${esc(f.vertical)}</td>
          <td class="mono truncate"><a class="link" data-context-id="${esc(f.context_id)}">${esc(f.context_id)}</a></td>
          <td class="mono truncate">${f.work_item_id ? `<a class="link" data-work-item-id="${esc(f.work_item_id)}">${esc(f.work_item_id)}</a>` : '—'}</td>
          <td>${fmtDate(f.failed_at)}</td>
          <td class="truncate" title="${esc(f.error_message || '')}">${esc(f.error_message || '—')}</td>
        </tr>
      `).join('');

      $("content").innerHTML = `
        <div class="metrics">
          <div class="metric"><div class="value">${esc(overview.global.total_work_items)}</div><div class="label">Work items</div></div>
          <div class="metric"><div class="value">${esc(overview.global.total_active_executions)}</div><div class="label">Active executions</div></div>
          <div class="metric"><div class="value">${esc(overview.global.total_pending_intents)}</div><div class="label">Pending intents</div></div>
          <div class="metric"><div class="value">${esc(overview.global.total_recent_facts)}</div><div class="label">24h facts</div></div>
          <div class="metric"><div class="value">${esc(overview.global.total_recent_failures)}</div><div class="label">24h failures</div></div>
        </div>
        ${scope ? `
          <div class="card">
            <h3>Scope: ${esc(scope.scope_id)}</h3>
            <div style="margin-bottom:12px;">
              <strong>Active verticals:</strong>
              ${scope.active_verticals.length ? scope.active_verticals.map(v => `<span class="badge">${esc(v)}</span>`).join(' ') : '<span class="badge">—</span>'}
            </div>
            <div style="margin-bottom:12px; font-size:12px; color:var(--text-secondary);">
              Last activity: ${scope.last_activity_at ? fmtDate(scope.last_activity_at) : '—'}
            </div>
            <div class="metrics">
              <div class="metric"><div class="value">${esc(scope.work_items.opened)}</div><div class="label">Opened</div></div>
              <div class="metric"><div class="value">${esc(scope.work_items.leased)}</div><div class="label">Leased</div></div>
              <div class="metric"><div class="value">${esc(scope.work_items.executing)}</div><div class="label">Executing</div></div>
              <div class="metric"><div class="value">${esc(scope.work_items.failed_retryable)}</div><div class="label">Failed (retryable)</div></div>
              <div class="metric"><div class="value">${esc(scope.work_items.failed_terminal)}</div><div class="label">Failed (terminal)</div></div>
              <div class="metric"><div class="value">${esc(scope.intents.pending)}</div><div class="label">Pending intents</div></div>
              <div class="metric"><div class="value">${esc(scope.intents.executing)}</div><div class="label">Executing intents</div></div>
              <div class="metric"><div class="value">${esc(scope.executions.active)}</div><div class="label">Active executions</div></div>
              <div class="metric"><div class="value">${esc(scope.executions.failed_recent)}</div><div class="label">Failed executions</div></div>
            </div>
          </div>
        ` : ''}
        <div class="card">
          <h3>Fact volume by vertical (24h)</h3>
          ${factRows.length ? `
            <table>
              <thead><tr><th>Vertical</th><th>Count</th></tr></thead>
              <tbody>${factRows}</tbody>
            </table>
          ` : '<div class="empty">No recent facts.</div>'}
        </div>
        <div class="card">
          <h3>Recent failures (${esc(filterRows(overview.recent_failures, ["scope_id", "vertical", "context_id", "work_item_id"]).length)})</h3>
          ${failureRows.length ? `
            <table>
              <thead><tr><th>Scope</th><th>Vertical</th><th>Context</th><th>Work item</th><th>Failed at</th><th>Error</th></tr></thead>
              <tbody>${failureRows}</tbody>
            </table>
          ` : '<div class="empty">No recent failures.</div>'}
        </div>
      `;
      bindDetailLinks();
    }

    async function loadMailbox() {
      const { view } = await api(`/scopes/${encodeURIComponent(currentScope)}/mailbox`);
      const conversations = filterRows(view.conversations, ["context_id", "status", "primary_charter"]);
      const outbound = filterRows(view.outbound, ["outbound_id", "action_type", "status"]);
      const outputs = filterRows(view.outputs, ["output_id", "context_id", "charter_id", "summary"]);

      const conversationRows = conversations.map(r => `
        <tr>
          <td class="mono truncate"><a class="link" data-context-id="${esc(r.context_id)}">${esc(r.context_id)}</a></td>
          <td>${badge(r.status)}</td>
          <td class="mono">${esc(r.primary_charter)}</td>
          <td>${esc(r.assigned_agent || "—")}</td>
          <td>${fmtDate(r.last_inbound_at)}</td>
          <td>${fmtDate(r.last_outbound_at)}</td>
          <td>${fmtDate(r.last_message_at)}</td>
        </tr>
      `).join("");

      const outboundRows = outbound.map(r => `
        <tr>
          <td class="mono truncate">${esc(r.outbound_id)}</td>
          <td class="mono">${esc(r.action_type)}</td>
          <td>${badge(r.status)}</td>
          <td class="mono truncate"><a class="link" data-context-id="${esc(r.context_id)}">${esc(r.context_id)}</a></td>
          <td>${fmtDate(r.submitted_at)}</td>
          <td>${fmtDate(r.confirmed_at)}</td>
          <td>${r.reviewed_at ? '✓ ' + fmtDate(r.reviewed_at) : '—'}</td>
          <td class="mono truncate">${esc(r.external_reference || '—')}</td>
          <td>
            ${r.status === 'draft_ready' ? `
              <button class="small" onclick="doAction('reject_draft', '${esc(r.outbound_id)}', {rationale: prompt('Rationale (optional)?') || undefined})" title="Reject draft">Reject</button>
              <button class="small" onclick="doAction('mark_reviewed', '${esc(r.outbound_id)}', {reviewer_notes: prompt('Reviewer notes (optional)?') || undefined})" title="Mark reviewed">Review</button>
              <button class="small" onclick="doAction('handled_externally', '${esc(r.outbound_id)}', {external_reference: prompt('External reference?') || ''})" title="Handled externally">External</button>
            ` : ''}
          </td>
        </tr>
      `).join("");

      const outputRows = outputs.map(r => `
        <tr>
          <td class="mono truncate">${esc(r.output_id)}</td>
          <td class="mono truncate"><a class="link" data-context-id="${esc(r.context_id)}">${esc(r.context_id)}</a></td>
          <td class="mono">${esc(r.charter_id)}</td>
          <td class="truncate">${esc(r.summary)}</td>
          <td>${fmtDate(r.analyzed_at)}</td>
        </tr>
      `).join("");

      $("content").innerHTML = `
        <div class="card">
          <h3>Conversations (${esc(conversations.length)})</h3>
          ${conversations.length ? `
            <table>
              <thead><tr><th>Context ID</th><th>Status</th><th>Charter</th><th>Assigned</th><th>Last inbound</th><th>Last outbound</th><th>Last message</th></tr></thead>
              <tbody>${conversationRows}</tbody>
            </table>
          ` : '<div class="empty">No conversations.</div>'}
        </div>
        <div class="card">
          <h3>Outbound commands (${esc(outbound.length)})</h3>
          ${outbound.length ? `
            <table>
              <thead><tr><th>Outbound ID</th><th>Action</th><th>Status</th><th>Context</th><th>Submitted</th><th>Confirmed</th><th>Reviewed</th><th>External Ref</th><th>Actions</th></tr></thead>
              <tbody>${outboundRows}</tbody>
            </table>
          ` : '<div class="empty">No outbound commands.</div>'}
        </div>
        <div class="card">
          <h3>Charter outputs (${esc(outputs.length)})</h3>
          ${outputs.length ? `
            <table>
              <thead><tr><th>Output ID</th><th>Context</th><th>Charter</th><th>Summary</th><th>Analyzed</th></tr></thead>
              <tbody>${outputRows}</tbody>
            </table>
          ` : '<div class="empty">No charter outputs.</div>'}
        </div>
      `;
      bindDetailLinks();
    }

    async function loadAudit() {
      const sinceVal = $("auditSinceInput")?.value;
      const sinceParam = sinceVal ? `?since=${encodeURIComponent(new Date(sinceVal).toISOString())}` : "";
      const { actions } = await api(`/scopes/${encodeURIComponent(currentScope)}/operator-actions${sinceParam}`);
      const actionTypeFilter = $("auditActionType")?.value || "";
      const searchKeys = ["action_id", "action_type", "actor", "context_id", "work_item_id", "payload_summary"];
      let rows = filterRows(actions, searchKeys);
      if (actionTypeFilter) {
        rows = rows.filter((r) => r.action_type === actionTypeFilter);
      }
      $("content").innerHTML = `
        <div class="card">
          <h3>Audit log (${esc(rows.length)})</h3>
          <p style="color:var(--text-secondary);font-size:12px;margin-top:0;">Operator actions recorded for this scope.</p>
          <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
            <label style="font-size:12px;color:var(--text-secondary);">Since</label>
            <input id="auditSinceInput" type="datetime-local" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;" value="${esc(sinceVal || "")}" />
            <label style="font-size:12px;color:var(--text-secondary);">Action</label>
            <select id="auditActionType" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;">
              <option value="">All</option>
              <option value="trigger_sync" ${actionTypeFilter === "trigger_sync" ? "selected" : ""}>trigger_sync</option>
              <option value="request_redispatch" ${actionTypeFilter === "request_redispatch" ? "selected" : ""}>request_redispatch</option>
              <option value="retry_work_item" ${actionTypeFilter === "retry_work_item" ? "selected" : ""}>retry_work_item</option>
              <option value="acknowledge_alert" ${actionTypeFilter === "acknowledge_alert" ? "selected" : ""}>acknowledge_alert</option>
              <option value="derive_work" ${actionTypeFilter === "derive_work" ? "selected" : ""}>derive_work</option>
              <option value="preview_work" ${actionTypeFilter === "preview_work" ? "selected" : ""}>preview_work</option>
              <option value="rebuild_projections" ${actionTypeFilter === "rebuild_projections" ? "selected" : ""}>rebuild_projections</option>
              <option value="reject_draft" ${actionTypeFilter === "reject_draft" ? "selected" : ""}>reject_draft</option>
              <option value="mark_reviewed" ${actionTypeFilter === "mark_reviewed" ? "selected" : ""}>mark_reviewed</option>
              <option value="handled_externally" ${actionTypeFilter === "handled_externally" ? "selected" : ""}>handled_externally</option>
            </select>
            <button id="auditApplyBtn" class="small primary">Apply</button>
          </div>
          ${rows.length ? `
            <table>

        (e.work_item_id && e.work_item_id.toLowerCase().includes(q))
      ) : events;

      const kindBadge = (kind) => {
        const color = {
          fact_ingested: 'badge-admitted',
          fact_admitted: 'badge-admitted',
          context_formed: 'badge-leased',
          work_opened: 'badge-opened',
          work_superseded: 'badge-executing',
          work_resolved: 'badge-resolved',
          work_failed: 'badge-failed',
        }[kind] || '';
        return badge(kind.replace(/_/g, ' '), color);
      };

      $("content").innerHTML = `
        <div class="card">
          <h3>Unified timeline (${esc(rows.length)})</h3>
          ${rows.length ? `
            <table>
              <tbody>

                          <div class="timeline-meta">
                            ${fmtDate(r.event_at)}
                            ${r.fact_id ? ` · Fact: <a class="link" data-fact-id="${esc(r.fact_id)}">${esc(r.fact_id)}</a>` : ''}
                            ${r.context_id ? ` · Context: <a class="link" data-context-id="${esc(r.context_id)}">${esc(r.context_id)}</a>` : ''}
                            ${r.work_item_id ? ` · Work: <a class="link" data-work-item-id="${esc(r.work_item_id)}">${esc(r.work_item_id)}</a>` : ''}
                          </div>
                        </div>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : '<div class="empty">No events match.</div>'}
        </div>
      `;
      bindDetailLinks();
    }

          </div>
          <div class="card">
            <h3>Execution</h3>
            <table>
              <tbody>
                <tr><th>ID</th><td class="mono">${esc(execution.execution_id)}</td></tr>
                <tr><th>Work Item ID</th><td class="mono">${esc(execution.work_item_id)}</td></tr>
                <tr><th>Revision ID</th><td class="mono">${esc(execution.revision_id)}</td></tr>
                <tr><th>Session ID</th><td class="mono">${esc(execution.session_id || '—')}</td></tr>
                <tr><th>Status</th><td>${badge(execution.status)}</td></tr>
                <tr><th>Started At</th><td>${fmtDate(execution.started_at)}</td></tr>
                <tr><th>Completed At</th><td>${fmtDate(execution.completed_at)}</td></tr>
                <tr><th>Error</th><td>${esc(execution.error_message || '—')}</td></tr>
              </tbody>
            </table>
          </div>
          <div class="card">
            <h3>Runtime Envelope</h3>
            ${execution.runtime_envelope ? renderJson(execution.runtime_envelope) : '<div class="empty">No envelope.</div>'}
          </div>
          <div class="card">
            <h3>Outcome</h3>
            ${execution.outcome ? renderJson(execution.outcome) : '<div class="empty">No outcome.</div>'}
          </div>
        `;
        bindDetailLinks();
        $("statusText").textContent = `Scope: ${esc(currentScope)} · execution · ${esc(executionId)}`;
      } catch (err) {
        if (err.name !== "AbortError") setError(err);
      }
    }

    window.restoreDetailState = function restoreDetailState() {
      if (detailState) {
        currentPage = detailState.returnPage || 'overview';
        detailState = null;
        $$('nav menu li a').forEach(a => {
          a.classList.toggle('active', a.dataset.page === currentPage);
        });
        loadPage();
      } else {
        currentPage = 'overview';
        $$('nav menu li a').forEach(a => a.classList.remove('active'));
        document.querySelector('nav menu li a[data-page="overview"]').classList.add('active');
        loadPage();
      }
    };

    async function loadPage() {
      if (!currentScope) {
        $("content").innerHTML = '<div class="empty">Select a scope to begin.</div>';
        return;
      }
      if (abortController) abortController.abort();
      abortController = new AbortController();
      setLoading();
      try {
        const map = {
          overview: loadOverview,
          timeline: loadTimeline,
          facts: loadFacts,
          contexts: loadContexts,
          work: loadWork,
          intents: loadIntents,
          executions: loadExecutions,
          workers: loadWorkers,
          operability: loadOperability,
          failures: loadFailures,
          verticals: loadVerticals,
          mailbox: loadMailbox,
          audit: loadAudit,
        };
        await map[currentPage]();
        $("statusText").textContent = `Scope: ${esc(currentScope)} · ${esc(currentPage)}`;
      } catch (err) {
        if (err.name !== "AbortError") setError(err);
      }
    }

    $("scopeSelect").addEventListener("change", (e) => {
      currentScope = e.target.value;
      loadPage();
    });

    $("refreshBtn").addEventListener("click", () => loadPage());

    $("searchInput").addEventListener("input", () => {
      if (currentScope) loadPage();
    });

    $$("nav menu li a").forEach(a => {
      a.addEventListener("click", (e) => {
        e.preventDefault();
        currentPage = a.dataset.page;
        $$("nav menu li a").forEach(x => x.classList.remove("active"));
        a.classList.add("active");
        loadPage();
      });
    });

    loadScopes();
  </script>
</body>
</html>
