<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Narada Agent Web UI</title>
    <link rel="stylesheet" href="./agent-web-ui.css">
    <script type="application/json" id="nars-config">__NARADA_AGENT_WEB_UI_CONFIG__</script>
    <script type="module" src="./agent-web-ui.js"></script>
  </head>
  <body>
    <main class="shell" aria-label="Narada Agent Web UI">
      <section class="status" aria-label="Session status">
        <div><span class="label">Events</span><span id="event-endpoint">not configured</span></div>
        <div><span class="label">Health</span><span id="health-endpoint">not configured</span></div>
        <div><span class="label">Stream</span><span id="stream">starting</span></div>
        <div><span class="label">State</span><span id="health">checking</span></div>
        <div>
          <label class="label" for="projection-verbosity">View</label>
          <select id="projection-verbosity" aria-label="Projection verbosity">
            <option value="operations" selected>operations</option>
            <option value="conversation">conversation</option>
            <option value="diagnostics">diagnostics</option>
            <option value="raw">raw</option>
          </select>
        </div>
      </section>
      <ol id="events" class="events" aria-label="NARS session events"></ol>
      <form id="operator-form" class="composer" aria-label="Operator input">
        <textarea id="operator-input" rows="3" autocomplete="off" spellcheck="true" placeholder="Message the agent"></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
  </body>
</html>
