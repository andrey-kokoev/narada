[package]
name = "narada-agent-tui"
version = "0.1.0"
edition = "2024"
description = "Narada pane/composer terminal carrier for interactive agents"
license = "UNLICENSED"
publish = false

[lib]
name = "narada_agent_tui"
path = "src/lib.rs"

[[bin]]
name = "narada-agent-tui"
path = "src/main.rs"

[dependencies]
crossterm = "0.28"
ratatui = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tui-textarea = { version = "0.7", default-features = false, features = ["ratatui"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_System_JobObjects", "Win32_System_Threading"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
