name = "narada-cloudflare-carrier"
main = "src/worker-entry.mjs"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

[ai]
binding = "AI"

[vars]
CLOUDFLARE_CARRIER_ENABLE_TASK_TOOLS = "1"
CLOUDFLARE_CARRIER_ENABLE_INTELLIGENCE_DIAGNOSTICS = "0"
CLOUDFLARE_CARRIER_SITE_ID = "site_narada_cloudflare"
CLOUDFLARE_REPOSITORY_PUBLICATION_ALLOWED_REPOSITORIES = "github:andrey-kokoev/narada,github:andrey-kokoev/narada.sonar"
CLOUDFLARE_REPOSITORY_PUBLICATION_ALLOWED_BRANCHES = "main,cloudflare-publication"
CLOUDFLARE_WEBHOOK_DELAY_SCHEDULED_READ_ENABLED = "1"
CLOUDFLARE_WEBHOOK_DELAY_SCHEDULED_SITE_ID = "site_narada_cloudflare"
CLOUDFLARE_WEBHOOK_DELAY_SCHEDULED_SOURCE_ADAPTER_ID = "sonar_webhook_delay_windows_readonly_db_summary_feed_v1"
CLOUDFLARE_WEBHOOK_DELAY_DIRECT_SOURCE_ADAPTER_ID = "sonar_webhook_delay_direct_remote_metric_source_v1"
CLOUDFLARE_WEBHOOK_DELAY_DIRECT_SOURCE_ID = "sonar_webhook_delay_direct_remote_metric_source"
CLOUDFLARE_WEBHOOK_DELAY_CRITICAL_MINUTES = "15"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "CLOUDFLARE_CARRIER_TASK_DB"
database_name = "narada-cloudflare-carrier-tasks"
database_id = "e852bd91-e17d-4bd6-b841-f60ae5ef1c8d"

[[d1_databases]]
binding = "CLOUDFLARE_SITE_REGISTRY_DB"
database_name = "narada-cloudflare-site-registry"
database_id = "170ca715-9c9e-4c48-896f-0e8daba72217"

[[d1_databases]]
binding = "INTELLIGENCE_REGISTRY_DB"
database_name = "narada-cloudflare-site-registry"
database_id = "170ca715-9c9e-4c48-896f-0e8daba72217"

[[durable_objects.bindings]]
name = "CLOUDFLARE_CARRIER_SESSIONS"
class_name = "CloudflareCarrierDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CloudflareCarrierDurableObject"]
