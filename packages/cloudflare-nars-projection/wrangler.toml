name = "narada-nars-projection"
main = "dist/worker.js"
compatibility_date = "2026-06-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[durable_objects.bindings]]
name = "NARS_PROJECTION_STATE"
class_name = "NarsProjectionState"

[[durable_objects.bindings]]
name = "NARS_WORKSPACE_DIRECTORY"
class_name = "NarsWorkspaceDirectory"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NarsProjectionState"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["NarsWorkspaceDirectory"]

[assets]
directory = "public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Provider-capable authority (cloudflare_provider_http_adapter) — optional.
# The Worker activates the provider adapter only when NARADA_INTELLIGENCE_PROVIDER
# resolves with a credential; without it the synthetic default adapter
# (cloudflare_runtime_tool_adapter) runs. The binding resolves from the shared
# provider registry through @narada2/carrier-provider-contract — the same
# canonical vocabulary as local NARS. The provider turn speaks the standard
# OpenAI-compatible chat-completions shape, so any OpenAI-compatible provider
# in the registry binds directly. The API key is a Worker secret, never a var:
#   wrangler secret put NARADA_AI_API_KEY
# whose value mirrors the pwsh SecretStore entry:
#   narada/provider/<provider>/api-key   (e.g. narada/provider/kimi-code-api/api-key)
# See docs/concepts/cloudflare-nars-web-projection.md
# "Deployed Provider-Capable Authority Smoke". Live evidence: Task 2120.
#
# [vars]
# NARADA_INTELLIGENCE_PROVIDER = "<provider-id>"   # required to activate
# NARADA_AI_BASE_URL = "https://<override>"        # optional; registry default otherwise
# NARADA_AI_MODEL = "<model-id>"                   # optional; registry default otherwise
# NARADA_AI_THINKING = "<low|medium|high>"         # optional
